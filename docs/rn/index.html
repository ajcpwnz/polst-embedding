<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>React Native demo — Polst embedding</title>
    <link rel="stylesheet" href="../assets/chrome.css" />
    <style>
      :root {
        --bg: #fafafa;
        --fg: #111;
        --muted: #555;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0c0d;
          --fg: #f5f5f5;
          --muted: #a8a8a8;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.5;
      }
      .demo-wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 24px 96px;
      }
      .demo-wrap h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      .demo-wrap .icon {
        font-size: 2rem;
        line-height: 1;
        display: block;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div id="chrome"></div>
    <div class="demo-wrap">
      <span class="icon" aria-hidden="true">⚛️</span>
      <h1>React Native</h1>
      <main id="demo"></main>
    </div>
    <script type="module">
      import { bootstrap } from '../assets/chrome-render.js';
      bootstrap({ sourcePath: 'docs/rn/index.html' });
    </script>
  </body>
</html>
