<!doctype html>
<html lang="en" data-polst-auto-observe>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>script tag demo — Polst embedding</title>
    <link rel="stylesheet" href="../assets/chrome.css" />
    <link rel="stylesheet" href="script.css" />
    <style>
      :root {
        --bg: #fafafa;
        --fg: #111;
        --muted: #555;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0c0d;
          --fg: #f5f5f5;
          --muted: #a8a8a8;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.5;
      }
      .demo-wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 24px 96px;
      }
      .demo-wrap h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      .demo-wrap .icon {
        font-size: 2rem;
        line-height: 1;
        display: block;
        margin-bottom: 12px;
      }
      .demo-wrap p.lede {
        margin: 0 0 24px;
        color: var(--muted);
        max-width: 640px;
      }
    </style>
    <!--
      The widget bundle. Loading it from unpkg with `type="module" async`
      mirrors what an integrator would copy-paste. The bundle installs
      `window.Polst` and a MutationObserver that auto-hydrates any
      `[data-polst]` / `[data-polst-campaign]` / `[data-polst-brand]`
      element inserted into the page (gated by `data-polst-auto-observe`
      on <html>, which we set above).
    -->
    <script
      src="https://unpkg.com/@polst-web/widget@latest/dist/widget.esm.js"
      type="module"
      async
    ></script>
  </head>
  <body>
    <div id="chrome"></div>
    <div class="demo-wrap">
      <span class="icon" aria-hidden="true">📜</span>
      <h1>script tag</h1>
      <p class="lede">
        Drop a <code>&lt;script&gt;</code> tag and a
        <code>&lt;div data-polst&gt;</code> on any page — the widget
        hydrates inside its own Shadow DOM. Use the controls below to
        tweak theme, accent, and visibility; the snippet on the right
        updates in real time.
      </p>
      <main id="demo"></main>
    </div>
    <script type="module">
      import { bootstrap } from '../assets/chrome-render.js';
      import { init } from './script.js';
      bootstrap({ sourcePath: 'docs/script/index.html' });
      // bootstrap() schedules DOMContentLoaded if needed; init() does the
      // same defer to make sure the demo mount runs after the chrome bar
      // and (when applicable) the empty-state placeholder are in place.
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init, { once: true });
      } else {
        init();
      }
    </script>
  </body>
</html>
