<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REST API demo — Polst embedding</title>
    <link rel="stylesheet" href="../assets/chrome.css" />
    <link rel="stylesheet" href="api.css" />
    <style>
      :root {
        --bg: #fafafa;
        --fg: #111;
        --muted: #555;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0c0d;
          --fg: #f5f5f5;
          --muted: #a8a8a8;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.5;
      }
      .demo-wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 24px 96px;
      }
      .demo-wrap h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      .demo-wrap .icon {
        font-size: 2rem;
        line-height: 1;
        display: block;
        margin-bottom: 12px;
      }
      .demo-wrap p.lede {
        margin: 0 0 24px;
        color: var(--muted);
        max-width: 640px;
      }
    </style>
  </head>
  <body>
    <div id="chrome"></div>
    <div class="demo-wrap">
      <span class="icon" aria-hidden="true">🔌</span>
      <h1>REST API</h1>
      <p class="lede">
        Pure <code>fetch()</code> against <code>/api/rest/v1</code>. Each
        card below is a request you could paste into your own app — no
        SDK, no client lib, just the public REST surface. Hit
        <strong>Run</strong> to fire the request against the active
        env.
      </p>
      <main id="demo"></main>
    </div>
    <script type="module">
      import { bootstrap } from '../assets/chrome-render.js';
      import { init } from './api.js';
      bootstrap({ sourcePath: 'docs/api/index.html' });
      // Defer init until the chrome has mounted (matches sdk/index.html).
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init, { once: true });
      } else {
        init();
      }
    </script>
  </body>
</html>
