<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JS SDK demo — Polst embedding</title>
    <link rel="stylesheet" href="../assets/chrome.css" />
    <link rel="stylesheet" href="sdk.css" />
    <style>
      :root {
        --bg: #fafafa;
        --fg: #111;
        --muted: #555;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c0c0d;
          --fg: #f5f5f5;
          --muted: #a8a8a8;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.5;
      }
      .demo-wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 24px 96px;
      }
      .demo-wrap h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
        letter-spacing: -0.02em;
      }
      .demo-wrap .icon {
        font-size: 2rem;
        line-height: 1;
        display: block;
        margin-bottom: 12px;
      }
      .demo-wrap p.lede {
        margin: 0 0 24px;
        color: var(--muted);
        max-width: 640px;
      }
    </style>
  </head>
  <body>
    <div id="chrome"></div>
    <div class="demo-wrap">
      <span class="icon" aria-hidden="true">🧩</span>
      <h1>JS SDK</h1>
      <p class="lede">
        Programmatic embedding via <code>@polst-web/sdk</code>. The
        snippet on the left is the exact code an integrator would
        write; it's also the exact code that runs to produce the
        output on the right.
      </p>
      <main id="demo"></main>
    </div>
    <script type="module">
      import { bootstrap } from '../assets/chrome-render.js';
      import { init } from './sdk.js';
      bootstrap({ sourcePath: 'docs/sdk/index.html' });
      // bootstrap() defers chrome render until DOMContentLoaded if the
      // document is still loading; we mirror that for init() so the
      // demo mount runs after the chrome bar (and any empty state) is
      // in place.
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init, { once: true });
      } else {
        init();
      }
    </script>
  </body>
</html>
