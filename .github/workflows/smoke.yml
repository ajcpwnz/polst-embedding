name: Smoke (Playwright)

# Daily passive regression against the deployed GH Pages site +
# staging API. Complements the curl-based `pages-smoke.yml`: that one
# catches CDN-layer 4xx/5xx in seconds; this one catches JS errors,
# missing widget bundles, and broken SDK calls that a status-code
# probe can't see.
#
# Concurrency cancels in-flight runs of the same ref so a rapid push
# train doesn't pile up.

on:
  schedule:
    # 12:00 UTC daily.
    - cron: "0 12 * * *"
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      shortId:
        description: "Stable polst shortId on staging to smoke-test against"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # TODO: replace 'STG-DEMO-01' with a real, stable polst shortId
      # on staging. Until a maintainer wires a real id, the sdk/api
      # modes will surface inline errors (rendered correctly — that's
      # what the selectors prove). The placeholder is intentional.
      # `workflow_dispatch.inputs.shortId` overrides at runtime.
      POLST_SMOKE_SHORTID: ${{ github.event.inputs.shortId || 'STG-DEMO-01' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 matches the polst monorepo's pinned engine.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/smoke/package-lock.json

      - name: Install Playwright deps
        working-directory: tests/smoke
        # Use `npm install` not `npm ci` because the lockfile is not
        # committed on first introduction. Once a lockfile lands a
        # follow-up can flip this to `npm ci`.
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        working-directory: tests/smoke
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: tests/smoke
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/smoke/playwright-report/
          retention-days: 14
