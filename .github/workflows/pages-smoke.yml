name: Pages smoke

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Curl deploy URL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Pages rebuild
        run: sleep 30

      - name: Verify deploy URL responds
        run: curl -fsSI https://ajcpwnz.github.io/polst-embedding/
